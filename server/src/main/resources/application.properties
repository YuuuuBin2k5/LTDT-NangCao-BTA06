# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mapic_db
spring.datasource.username=postgres
spring.datasource.password=01218552666aE@
spring.datasource.driver-class-name=org.postgresql.Driver

# Server configuration
server.port=8080

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization (Nạp seed data cho missions)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# Flyway configuration
spring.flyway.enabled=false

# Image upload configuration
app.upload.dir=uploads
# Use relative URL so client can construct full URL with correct IP
app.upload.base-url=/uploads

# Multipart file upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
